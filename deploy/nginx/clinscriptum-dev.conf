# /etc/nginx/conf.d/clinscriptum-dev.conf
#
# Dev server: 193.187.95.178
# Domains: app.dev.clinscriptum.ru, admin.dev.clinscriptum.ru, api.dev.clinscriptum.ru
#
# TLS: three separate Let's Encrypt certs via certbot --nginx
# Auth:
#   - app/admin: HTTP basic auth (.htpasswd-dev) + noindex
#   - api: no basic auth (CORS + JWT only), noindex

# ─── HTTP → HTTPS redirect ───────────────────────────────────────────────
server {
  listen 80;
  listen [::]:80;
  server_name
    app.dev.clinscriptum.ru
    admin.dev.clinscriptum.ru
    api.dev.clinscriptum.ru;

  # ACME challenge (certbot --webroot fallback if needed)
  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

# ─── app.dev.clinscriptum.ru → web (3000) ────────────────────────────────
server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name app.dev.clinscriptum.ru;

  ssl_certificate     /etc/letsencrypt/live/app.dev.clinscriptum.ru/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/app.dev.clinscriptum.ru/privkey.pem;
  ssl_trusted_certificate /etc/letsencrypt/live/app.dev.clinscriptum.ru/chain.pem;

  add_header Strict-Transport-Security "max-age=63072000" always;
  add_header X-Robots-Tag "noindex, nofollow" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  auth_basic           "ClinScriptum Dev";
  auth_basic_user_file /etc/nginx/.htpasswd-dev;

  client_max_body_size 50M;

  location / {
    proxy_pass http://127.0.0.1:3000;
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-Host  $host;
    proxy_set_header Upgrade           $http_upgrade;
    proxy_set_header Connection        "upgrade";
    proxy_read_timeout 300s;
  }
}

# ─── admin.dev.clinscriptum.ru → rule-admin (3002) ───────────────────────
server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name admin.dev.clinscriptum.ru;

  ssl_certificate     /etc/letsencrypt/live/admin.dev.clinscriptum.ru/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/admin.dev.clinscriptum.ru/privkey.pem;
  ssl_trusted_certificate /etc/letsencrypt/live/admin.dev.clinscriptum.ru/chain.pem;

  add_header Strict-Transport-Security "max-age=63072000" always;
  add_header X-Robots-Tag "noindex, nofollow" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  auth_basic           "ClinScriptum Dev Admin";
  auth_basic_user_file /etc/nginx/.htpasswd-dev;

  client_max_body_size 50M;

  location / {
    proxy_pass http://127.0.0.1:3002;
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-Host  $host;
    proxy_set_header Upgrade           $http_upgrade;
    proxy_set_header Connection        "upgrade";
    proxy_read_timeout 300s;
  }
}

# ─── api.dev.clinscriptum.ru → api (4000) ────────────────────────────────
server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name api.dev.clinscriptum.ru;

  ssl_certificate     /etc/letsencrypt/live/api.dev.clinscriptum.ru/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/api.dev.clinscriptum.ru/privkey.pem;
  ssl_trusted_certificate /etc/letsencrypt/live/api.dev.clinscriptum.ru/chain.pem;

  add_header Strict-Transport-Security "max-age=63072000" always;
  add_header X-Robots-Tag "noindex, nofollow" always;
  add_header X-Content-Type-Options "nosniff" always;

  client_max_body_size 50M;
  proxy_read_timeout    300s;
  proxy_send_timeout    300s;

  location / {
    proxy_pass http://127.0.0.1:4000;
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-Host  $host;
  }
}
