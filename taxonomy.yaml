        - "(?i)\\bрасч[её]т\\w*\\s+(размер\\w*\\s+)?выборк\\w*\\b"
        - "(?i)\\bопределен\\w*\\s+(размер\\w*\\s+|объ[её]м\\w*\\s+)?выборк\\w*\\b"
