procedures:
  canonical_zone: procedures
  title_ru: Процедуры
  # Статистика: «Процедуры исследования» (49x), «ОПИСАНИЕ ПРОЦЕДУР» (84x), «Study Procedures» (2x)
  patterns:
    - "(?i)\\bпроцедур\\w*\\s+исследован\\w*\\b"
    - "(?i)\\bописан\\w*\\s+процедур\\w*\\b"
    - "(?i)\\bпорядок\\s+проведен\\w*\\b"
    - "(?i)\\bметод\\w*\\s+исследован\\w*\\b"
    - "(?i)\\bstudy\\s+procedures?\\b"
  not_keywords:
    - "(?i)\\bстатист\\w*\\b"
    - "(?i)\\bконечн\\w*\\s+точк\\w*\\b"
    - "(?i)\\bадминистративн\\w*\\b"
  children:
    contraception_requirements:
      title_ru: Контрацепция / беременность
      # Перенесено из population.children в 2026-05-01: это операционные
      # процедуры протокола (тесты на беременность, требования к контрацепции
      # во время исследования), а не критерий отбора population. См.
      # project_known_bugs.md от 2026-05-01.
      require_patterns:
        - "(?i)\\b(контрацепц\\w*|беременност\\w*|pregnan\\w*)\\b"
      patterns:
        - "(?i)\\bконтрацепц\\w*\\b"
        - "(?i)\\bбеременност\\w*\\b"
        - "(?i)\\bpregnan\\w*\\b"
        - "(?i)\\bтест\\s+на\\s+беременност\\w*\\b"
      not_keywords:
        # Не путать с критериями невключения (population.exclusion) которые
        # упоминают беременность как exclusion criterion.
        - "(?i)\\bкритери\\w*\\s+(не\\s*)?включен\\w*\\b|\\b(in|ex)clusion\\s+criteria\\b"

    lifestyle:
      title_ru: Образ жизни / физическая активность
      # Новая subzone: ограничения по диете, курению, алкоголю, физактивности
      # на время исследования. Раньше попадало в parent procedures или
      # population.exclusion. Гейт жёсткий чтобы не путаться с safety.
      require_patterns:
        - "(?i)\\bобраз\\s+жизн\\w*\\b"
        - "(?i)\\bфизическ\\w*\\s+(активност\\w*|нагрузк\\w*|упражнен\\w*)\\b"
        - "(?i)\\blifestyle\\s+(modifications?|recommendations?|restrictions?)\\b"
        - "(?i)\\bphysical\\s+activity\\b"
        - "(?i)\\b(диет\\w*|питан\\w*|food|alcohol|алкогол\\w*|курени\\w*|smoking)\\s+(ограничен\\w*|restrictions?|recommendations?)\\b"
      patterns:
        - "(?i)\\bобраз\\s+жизн\\w*\\b"
        - "(?i)\\bфизическ\\w*\\s+(активност\\w*|нагрузк\\w*|упражнен\\w*)\\b"
        - "(?i)\\blifestyle\\b"
        - "(?i)\\bphysical\\s+activity\\b"
        - "(?i)\\bдиет\\w*\\s+ограничен\\w*\\b|\\bdietary\\s+restrictions?\\b"
        - "(?i)\\b(алкогол\\w*|курени\\w*)\\s+ограничен\\w*\\b"
        - "(?i)\\b(alcohol|smoking|tobacco)\\s+restrictions?\\b"
      not_keywords:
        # Не критерии отбора и не safety
        - "(?i)\\bкритери\\w*\\s+(не\\s*)?включен\\w*\\b|\\b(in|ex)clusion\\s+criteria\\b"
        - "(?i)\\bнежелательн\\w*\\s+явлен\\w*\\b|\\badverse\\s+events?\\b"

    # 2026-05-02: schedule_of_assessments объединена с design.visit_schedule.
    # Все patterns/require_patterns/not_keywords перенесены туда. См.
    # docs/section-classification-quality-plan.md и project_known_bugs.md.

    screening:
      title_ru: Скрининг
      require_patterns:
        - "(?i)\\b(скрининг|screening)\\b"
      patterns:
        - "(?i)\\bскрининг\\b"
        - "(?i)\\bscreening\\b"

    physical_examination:
      title_ru: Физикальное обследование
      require_patterns:
        - "(?i)\\b(физикальн\\w*\\s+обследован\\w*|physical\\s+examination|осмотр)\\b"
      patterns:
        - "(?i)\\bфизикальн\\w*\\s+обследован\\w*\\b"
        - "(?i)\\bphysical\\s+examination\\b"
        - "(?i)\\bосмотр\\w*\\b"

    vital_signs:
      title_ru: Жизненно важные показатели / антропометрия
      # Статистика: «Жизненно важные показатели» (3x), «Антропометрические и жизненно важные показатели» (5x),
      # «Показатели жизнедеятельности» (2x), «Жизненно важные параметры» (1x)
      require_patterns:
        - "(?i)\\b(жизненно\\s+важн\\w*|vital\\s+signs?|АД|ЧСС)\\b"
        - "(?i)\\bпоказател\\w*\\s+жизнедеятельност\\w*\\b"
        - "(?i)\\bантропометрич\\w*\\b"
      patterns:
        - "(?i)\\bжизненно\\s+важн\\w*\\s+(функц\\w*|показател\\w*|параметр\\w*)\\b"
        - "(?i)\\bпоказател\\w*\\s+жизнедеятельност\\w*\\b"
        - "(?i)\\bантропометрич\\w*\\s+(и\\s+жизненно\\s+важн\\w*)?\\s*показател\\w*\\b"
        - "(?i)\\bантропометрич\\w*\\b"
        - "(?i)\\bvital\\s+signs?\\b"
        - "(?i)\\bАД\\b"
        - "(?i)\\bЧСС\\b"
        - "(?i)\\bЧДД\\b"

    laboratory_assessments:
      title_ru: Лабораторные исследования
      require_patterns:
        - "(?i)\\b(лабораторн\\w*|laborator\\w*|анализ\\s+крови|анализ\\s+мочи)\\b"
      patterns:
        - "(?i)\\bлабораторн\\w*\\b"
        - "(?i)\\blaborator\\w*\\b"
        - "(?i)\\bанализ\\s+крови\\b"
        - "(?i)\\bанализ\\s+мочи\\b"
        - "(?i)\\bбиохим\\w*\\b"
        - "(?i)\\bгематолог\\w*\\b"

    imaging:
      title_ru: Инструментальные исследования / визуализация / ЭКГ
      # Статистика: «ЭКГ» (103x), «Электрокардиография» (66x), «Электрокардиограмма» (1x)
      require_patterns:
        - "(?i)\\b(МРТ|КТ|УЗИ|рентген\\w*|MRI|CT\\b|ultrasound|X-?ray|ЭКГ|ECG)\\b"
        - "(?i)\\bэлектрокардиогра\\w*\\b"
        - "(?i)\\belectrocardiogr\\w*\\b"
        - "(?i)\\bфлюорограф\\w*\\b"
      patterns:
        - "(?i)\\bМРТ\\b|\\bMRI\\b"
        - "(?i)\\bКТ\\b|\\bCT\\b"
        - "(?i)\\bУЗИ\\b|\\bultrasound\\b"
        - "(?i)\\bрентген\\w*\\b|\\bX-?ray\\b"
        - "(?i)\\bфлюорограф\\w*\\b"
        - "(?i)\\bЭКГ\\b|\\bECG\\b"
        - "(?i)\\bэлектрокардиогра\\w*\\b"
        - "(?i)\\belectrocardiogr\\w*\\b"

    sample_handling:
      title_ru: Биоматериал / забор / обработка образцов
      require_patterns:
        - "(?i)\\b(забор\\s+крови|отбор\\s+крови|био(материал|образц)\\w*|sample\\s+(handling|collection)|specimen)\\b"
      patterns:
        - "(?i)\\bзабор\\s+крови\\b"
        - "(?i)\\bотбор\\s+крови\\b"
        - "(?i)\\bбиоматериал\\w*\\b"
        - "(?i)\\bбиообразц\\w*\\b"
        - "(?i)\\bsample\\s+(handling|collection)\\b"
        - "(?i)\\bspecimen\\b"
        - "(?i)\\bцентрифуг\\w*\\b"
        - "(?i)\\bтранспортировк\\w*\\s+образц\\w*\\b"

    patient_reported_outcomes:
      title_ru: Опросники / дневники / PRO
      require_patterns:
        - "(?i)\\b(опросник\\w*|анкета\\w*|дневник\\w*|patient[-\\s]?reported|PRO)\\b"
      patterns:
        - "(?i)\\bопросник\\w*\\b"
        - "(?i)\\bанкета\\b"
        - "(?i)\\bдневник\\w*\\b"
        - "(?i)\\bpatient[-\\s]?reported\\b"
        - "(?i)\\b\\bPRO\\b\\b"

    compliance:
      title_ru: Комплаенс / комплаентность / учет таблеток
      # Статистика: «Комплаентность проводимой терапии» (58x) — доминирующий термин!
      require_patterns:
        - "(?i)\\b(комплаенс\\w*|комплаентност\\w*|compliance|уч[её]т\\s+таблет\\w*|pill\\s+count)\\b"
        - "(?i)\\bприверженност\\w*\\s+терап\\w*\\b"
      patterns:
        - "(?i)\\bкомплаенс\\w*\\b"
        - "(?i)\\bкомплаентност\\w*\\b"
        - "(?i)\\bприверженност\\w*\\s+терап\\w*\\b"
        - "(?i)\\bcompliance\\b"
        - "(?i)\\bуч[её]т\\s+таблет\\w*\\b"
        - "(?i)\\bpill\\s+count\\b"
        - "(?i)\\bвозврат\\s+препарат\\w*\\b"

# -------------------------------
# ENDPOINTS
# -------------------------------
endpoints:
  canonical_zone: endpoints
  title_ru: Конечные точки
  patterns:
    - "(?i)\\bконечн\\w*\\s+точк\\w*\\b"
    - "(?i)\\bendpoints?\\b"
    - "(?i)\\bпервичн\\w*\\s+конечн\\w*\\s+точк\\w*\\b"
    - "(?i)\\bвторичн\\w*\\s+конечн\\w*\\s+точк\\w*\\b"
  not_keywords:
    - "(?i)\\bстатист\\w*\\b|\\bSAP\\b"
  children:
    primary:
      title_ru: Первичная конечная точка
      # best practice gate (AND)
      require_patterns:
        - "(?i)(?=.*\\b(первичн\\w*|primary)\\b)(?=.*\\b(конечн\\w*\\s+точк\\w*|endpoint)\\b)"
      patterns:
        - "(?i)\\bпервичн\\w*\\s+конечн\\w*\\s+точк\\w*\\b"
        - "(?i)\\bprimary\\s+endpoint\\b"

    secondary:
      title_ru: Вторичные конечные точки
      # best practice gate (AND)
      require_patterns:
        - "(?i)(?=.*\\b(вторичн\\w*|secondary)\\b)(?=.*\\b(конечн\\w*\\s+точк\\w*|endpoint)\\b)"
      patterns:
        - "(?i)\\bвторичн\\w*\\s+конечн\\w*\\s+точк\\w*\\b"
        - "(?i)\\bsecondary\\s+endpoints?\\b"

    exploratory:
      title_ru: Исследовательские (exploratory)
      # ВНИМАНИЕ: паттерн \bисследоват\w*\b давал 71 FP на «Обязанности Исследователя»!
      # Ужесточён до конкретных конструкций.
      require_patterns:
        - "(?i)\\b(исследовательск\\w*\\s+(конечн\\w*\\s+точк\\w*|endpoint)|explorator\\w*\\s+endpoint)\\b"
        - "(?i)\\b(дополнительн\\w*|поисков\\w*|explorator\\w*)\\s+(конечн\\w*\\s+точк\\w*|endpoint|параметр\\w*)\\b"
      patterns:
        - "(?i)\\bисследовательск\\w*\\s+(конечн\\w*\\s+точк\\w*|endpoint)\\b"
        - "(?i)\\bдополнительн\\w*\\s+(конечн\\w*\\s+точк\\w*|endpoint)\\b"
        - "(?i)\\bпоисков\\w*\\s+(конечн\\w*\\s+точк\\w*|endpoint|параметр\\w*)\\b"
        - "(?i)\\bexplorator\\w*\\s+endpoints?\\b"
        - "(?i)\\bexplorator\\w*\\b"
      not_keywords:
        - "(?i)\\bобязанност\\w*\\s+исследоват\\w*\\b"
        - "(?i)\\bзаявлен\\w*\\s+исследоват\\w*\\b"
        - "(?i)\\bконтрактн\\w*\\s+исследовательск\\w*\\b"
        - "(?i)\\bисследовательск\\w*\\s+центр\\w*\\b"
        - "(?i)\\bисследовательск\\w*\\s+организац\\w*\\b"

    efficacy:
      title_ru: Эффективность (метрики/шкалы/основные параметры)
      # best practice: чтобы "эффективность" из rationale/background не утащила
      # Phase 2: расширены require/patterns под bare titles из baseline:
      # «Основные и дополнительные параметры эффективности, оцениваемые в исследовании» (FNT 29),
      # «Оценка эффективности» (FNT 121).
      require_patterns:
        - "(?i)\\b(конечн\\w*\\s+точк\\w*|endpoint)\\b"
        - "(?i)\\b(шкал\\w*|опросник\\w*|score|балл\\w*|изменен\\w*)\\b"
        - "(?i)\\b(основн\\w*\\s+(и\\s+дополнительн\\w*\\s+)?)?параметр\\w*\\s+эффективност\\w*\\b"
        - "(?i)^\\s*оценк\\w*\\s+эффективност\\w*\\s*$"
      patterns:
        - "(?i)\\bэффективност\\w*\\b"
        - "(?i)\\befficacy\\b"
        - "(?i)\\bшкал\\w*\\b"
        - "(?i)\\b(основн\\w*\\s+(и\\s+дополнительн\\w*\\s+)?)?параметр\\w*\\s+эффективност\\w*\\b"
        - "(?i)^\\s*оценк\\w*\\s+эффективност\\w*\\s*$"
        - "(?i)\\bопросник\\w*\\b"
        - "(?i)\\bизменен\\w*\\b"

    pharmacokinetics:
      title_ru: Фармакокинетика (PK endpoints)
      # best practice gate
      require_patterns:
        - "(?i)\\b(фармакокинет\\w*|PK)\\b"
        - "(?i)\\b(AUC|Cmax|Cmin|Ctrough|Tmax|t1/2|CL|Vd|AUC0-?\\d+)\\b"
      patterns:
        - "(?i)\\bфармакокинет\\w*\\b"
        - "(?i)\\b\\bPK\\b\\b"
        - "(?i)\\bAUC\\b"
        - "(?i)\\bCmax\\b|\\bCmin\\b"
        - "(?i)\\bTmax\\b"
        - "(?i)\\bt1/2\\b|\\bhalf[-\\s]?life\\b"
        - "(?i)\\bclearance\\b|\\bCL\\b"
        - "(?i)\\bvolume\\s+of\\s+distribution\\b|\\bVd\\b"

# -------------------------------
# SAFETY
# -------------------------------
safety:
  canonical_zone: safety
  title_ru: Безопасность
  patterns:
    - "(?i)\\bбезопасност\\w*\\b"
    - "(?i)\\bнежелател\\w*\\s+явлен\\w*\\b"
    - "(?i)\\bНЯ\\b|\\bAE\\b"
    - "(?i)\\bСНЯ\\b|\\bSAE\\b"
  not_keywords:
    - "(?i)\\bстатист\\w*\\b|\\bSAP\\b"
  children:
    adverse_events:
      title_ru: НЯ/СНЯ (общий раздел)
      require_patterns:
        - "(?i)\\b(НЯ|AE|нежелател\\w*\\s+явлен\\w*)\\b"
        - "(?i)\\b(СНЯ|SAE|serious)\\b"
      patterns:
        - "(?i)\\b(НЯ|AE)\\b"
        - "(?i)\\b(СНЯ|SAE)\\b"
        - "(?i)\\bнежелател\\w*\\s+явлен\\w*\\b"
        - "(?i)\\bserious\\s+adverse\\s+event\\b"

    adverse_events.definitions:
      title_ru: Определения НЯ/СНЯ/TEAE
      # Phase 2 (Sprint 6): расширены require_patterns чтобы matched bare AE-related
      # концепты которые в стандартном протоколе всегда открывают раздел определений:
      # «Нежелательное явление» (FNT 129, STP 151, Тетра 135, VLT 148),
      # «Серьезные нежелательные явления» (FNT 130, STP 155, Тетра 139),
      # «Определение и классификации» (STP 150, Тетра 134),
      # «Нежелательные явления, представляющие особый интерес» (VLT 149),
      # «Оценка дозолимитирующей токсичности» (Тетра 132 — фаза I специфика).
      # Главный риск — конкуренция с parent rule `adverse_events`. Hierarchical
      # scoring + bonus за same-parent subzone должны вытащить definitions вверх.
      require_patterns:
        - "(?i)(?=.*\\b(определен\\w*|definition|классификаци)\\b)(?=.*\\b(НЯ|AE|СНЯ|SAE|TEAE|нежелател\\w*|adverse)\\b)"
        - "(?i)\\bTEAE\\b"
        # Bare AE/SAE concepts — раздел определений в стандартном протоколе
        - "(?i)^\\s*(серьезн\\w*\\s+|серьёзн\\w*\\s+)?нежелательн\\w*\\s+явлен\\w*(\\s|$)"
        - "(?i)^\\s*определен\\w*\\s+и\\s+классификаци\\w*\\s*$"
        - "(?i)\\bдозолимитирующ\\w*\\s+токсичност\\w*\\b"
        - "(?i)\\bнежелательн\\w*\\s+явлен\\w*,?\\s+представляющ\\w*\\s+особ\\w*\\s+интерес\\w*\\b"
      patterns:
        - "(?i)\\bопределен\\w*\\s+(НЯ|СНЯ|нежелател\\w*)\\b"
        - "(?i)\\bопределен\\w*\\s+НР\\b"
        - "(?i)\\bdefinition\\w*\\s+(of\\s+)?(AE|SAE|adverse)\\b"
        - "(?i)\\bTEAE\\b"
        - "(?i)^\\s*(серьезн\\w*\\s+|серьёзн\\w*\\s+)?нежелательн\\w*\\s+явлен\\w*(\\s|$)"
        - "(?i)^\\s*определен\\w*\\s+и\\s+классификаци\\w*\\s*$"
        - "(?i)\\bдозолимитирующ\\w*\\s+токсичност\\w*\\b"
        - "(?i)\\bнежелательн\\w*\\s+явлен\\w*,?\\s+представляющ\\w*\\s+особ\\w*\\s+интерес\\w*\\b"
      not_keywords:
        # FP: «Определение размера выборки» (27x) → это statistics, не safety
        - "(?i)\\bопределен\\w*\\s+(размер\\w*|объ[её]м\\w*)\\s+выборк\\w*\\b"
        - "(?i)\\bопределен\\w*\\s+специфич\\w*\\b"
        # FP: «Сообщения / репортинг / отчётность» — это reporting, не definitions
        - "(?i)\\b(сообщен\\w*|регистрац\\w*|репорти\\w*|reporting)\\b"
        # FP: «Тяжесть / причинно-следственная / категория» — это assessment
        - "(?i)\\b(тяжест\\w*|severity|причинно[-\\s]?следствен\\w*|категор\\w*\\s+предприн\\w*|метод\\w*\\s+и\\s+продолжит\\w*\\s+наблюден\\w*)\\b"

    adverse_events.assessment:
      title_ru: Оценка НЯ (тяжесть/каузальность/последующее наблюдение)
      # Phase 2: расширены patterns для:
      # «Категории предпринятых действий и исход НЯ и СНЯ» (FNT 132, STP 154, Тетра 138, VLT 152),
      # «Метод и продолжительность наблюдения за субъектами после НЯ» (FNT 136, STP 160, Тетра 144, VLT 158),
      # «Отклонения клинико-лабораторных показателей» (VLT 150),
      # «Мероприятия в случае возникновения СНЯ/НЯ» (VLT 157).
      require_patterns:
        - "(?i)\\b(тяжест\\w*|severity|степен\\w*\\s+выражен\\w*|causality|причинно[-\\s]?следствен\\w*)\\b"
        # Bare assessment-related titles
        - "(?i)\\bкатегори\\w*\\s+предприн\\w*\\s+действ\\w*\\s+и\\s+исход\\w*\\b"
        - "(?i)\\b(метод\\w*\\s+и\\s+)?продолжит\\w*\\s+наблюден\\w*\\s+за\\s+субъект\\w*\\s+(исследован\\w*\\s+)?после\\b"
        - "(?i)\\bотклонен\\w*\\s+клинико[-\\s]?лабораторн\\w*\\s+показател\\w*\\b"
        - "(?i)\\bмероприят\\w*\\s+в\\s+случае\\s+возникнов\\w*\\s+(СНЯ|НЯ)\\b"
      patterns:
        - "(?i)\\bтяжест\\w*\\b"
        - "(?i)\\bseverity\\b"
        - "(?i)\\bстепен\\w*\\s+выражен\\w*\\b"
        - "(?i)\\bcausality\\b"
        - "(?i)\\bпричинно[-\\s]?следствен\\w*\\s+связ\\w*\\b"
        - "(?i)\\bкатегори\\w*\\s+предприн\\w*\\s+действ\\w*\\b"
        - "(?i)\\bпродолжит\\w*\\s+наблюден\\w*\\s+за\\s+субъект\\w*\\s+(исследован\\w*\\s+)?после\\b"
        - "(?i)\\bотклонен\\w*\\s+клинико[-\\s]?лабораторн\\w*\\s+показател\\w*\\b"
        - "(?i)\\bмероприят\\w*\\s+в\\s+случае\\s+возникнов\\w*\\s+(СНЯ|НЯ)\\b"

    adverse_events.reporting:
      title_ru: Репортинг / отчётность о НЯ/СНЯ
      # Статистика: «Отчетность о НЯ» (55x), «Отчетность о НЯ и СНЯ» (8x),
      # «Сроки регистрации НЯ» (34x), «Предоставление сообщений о СНЯ» (44x).
      # Phase 2: расширены lookahead'ы первого require_pattern — добавлены
      # «нежелател\\w*» / «adverse» в первый lookahead, «репорти» во второй.
      # Это позволяет matched bare titles типа «Регистрация нежелательных явлениях»
      # (FNT 134, STP 157, Тетра 141) и «Сообщения о серьезных нежелательных явлениях»
      # (FNT 133, STP 158, Тетра 142), «Репортирование НЯ и СНЯ» (VLT 153),
      # «Заполнение отчетной документации» (VLT 154).
      require_patterns:
        - "(?i)(?=.*\\b(СНЯ|SAE|serious|НЯ|AE|нежелател\\w*|adverse|серьезн\\w+\\s+нежелател|серьёзн\\w+\\s+нежелател)\\b)(?=.*\\b(сообщ\\w*|уведом\\w*|report\\w*|репорти\\w*|expedited|отчетност\\w*|отчётност\\w*|регистрац\\w*|заполнен\\w*\\s+отчетн)\\b)"
        - "(?i)\\b(24\\s*час\\w*|within\\s+24\\s+hours?|в\\s+течени[еи]\\s+\\d+\\s*(час\\w*|дн(я|ей)))\\b"
        - "(?i)\\bотчетност\\w*\\s+о\\s+(НЯ|СНЯ|нежелател\\w*)\\b"
        - "(?i)\\bотчётност\\w*\\s+о\\s+(НЯ|СНЯ|нежелател\\w*)\\b"
        - "(?i)\\bпредоставлен\\w*\\s+сообщен\\w*\\s+о\\s+СНЯ\\b"
        - "(?i)\\bсроки\\s+регистрац\\w*\\s+НЯ\\b"
        - "(?i)\\bрегистрац\\w*\\s+нежелател\\w*\\s+явлен\\w*\\b"
        - "(?i)\\bсообщен\\w*\\s+о\\s+(серьезн\\w+\\s+|серьёзн\\w+\\s+)?нежелател\\w*\\s+явлен\\w*\\b"
        - "(?i)\\bрепорти\\w*\\s+(НЯ|СНЯ|нежелател\\w*)\\b"
        - "(?i)\\bзаполнен\\w*\\s+отчетн\\w*\\s+документац\\w*\\b"
        - "(?i)\\bтребован\\w*\\s+к\\s+отчет\\w*\\b"
      patterns:
        - "(?i)\\bотчетност\\w*\\s+о\\s+(НЯ|СНЯ|нежелател\\w*)\\b"
        - "(?i)\\bотчётност\\w*\\s+о\\s+(НЯ|СНЯ|нежелател\\w*)\\b"
        - "(?i)\\bпредоставлен\\w*\\s+сообщен\\w*\\s+о\\s+СНЯ\\b"
        - "(?i)\\bсроки\\s+регистрац\\w*\\s+НЯ\\b"
        - "(?i)\\bсообщен\\w*\\b|\\breport\\w*\\b"
        - "(?i)\\bуведом\\w*\\b|\\bnotify\\b"
        - "(?i)\\bexpedited\\s+report\\b"
        - "(?i)\\b24\\s*час\\w*\\b"
        - "(?i)\\bрегистрац\\w*\\s+нежелател\\w*\\s+явлен\\w*\\b"
        - "(?i)\\bсообщен\\w*\\s+о\\s+(серьезн\\w+\\s+|серьёзн\\w+\\s+)?нежелател\\w*\\s+явлен\\w*\\b"
        - "(?i)\\bрепорти\\w*\\s+(НЯ|СНЯ|нежелател\\w*)\\b"
        - "(?i)\\bзаполнен\\w*\\s+отчетн\\w*\\s+документац\\w*\\b"
        - "(?i)\\bтребован\\w*\\s+к\\s+отчет\\w*\\b"
        - "(?i)\\bsafety\\s+reporting\\b"

    risk_benefit_assessment:
      title_ru: Польза/риск + любые секции про риски КИ
      # Статистика: «Соотношение риск/польза» (71x) — ранее не ловилось
      # Phase 2 (Sprint 6, expert-classification-rules.md правило «Риски»):
      # эксперт всегда классифицирует секции со словом «Риски» в risk_benefit_assessment:
      # «Краткое описание известных и потенциальных рисков и пользы» (4/4 sample),
      # «Риски, связанные с приемом исследуемого препарата» (FNT 15),
      # «Риски, связанные с введением исследуемого препарата» (Тетра 14, VLT 15),
      # «Риски, связанные с введением препарата сравнения» (VLT 16),
      # «Риски, связанные с выполнением диагностических процедур исследования» (4/4),
      # «Риски, связанные с распределением в группу плацебо» (FNT 17),
      # «Неизвестные или непредвиденные риски» (4/4).
