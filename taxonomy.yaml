        - "(?i)\\bрасч[её]т\\w*\\s+(размер\\w*\\s+)?выборк\\w*\\b"
        - "(?i)\\bзапланированн\\w*\\s+размер\\w*\\s+выборк\\w*\\b"

    missing_data_handling:
