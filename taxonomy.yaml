# ==============================================================================
# Таксономия для разбиения протокола на зоны/подзоны (v3)
# - Добавлена поддержка require_patterns / gate_patterns (гейт-паттерны)
# - Добавлен best-practice pack require_patterns для "дорогих" подзон (FP-min)
#
# ВАЖНО:
# 1) require_patterns = ЖЕСТКИЙ ГЕЙТ: если НИ ОДИН regex не совпал (в title или preview),
#    score=0 и зона/подзона не выбирается.
# 2) Для dotted-subzones (например safety: adverse_events.reporting) используем ключи С ТОЧКОЙ,
# ==============================================================================

# -------------------------------
# OVERVIEW
# -------------------------------
overview:
  canonical_zone: overview
  title_ru: Обзор исследования
  patterns:
    - "(?i)\\bобщ(ая|ие)\\s+информац\\w*\\b"
    - "(?i)\\bобзор\\b"
    - "(?i)\\bвведен\\w*\\b"
    - "(?i)\\bbackground\\b"
    - "(?i)\\bintroduction\\b"
  not_keywords:
    - "(?i)\\bстатист\\w*\\b"
    - "(?i)\\bрандомизац\\w*\\b"
    - "(?i)\\bконечн\\w*\\s+точк\\w*\\b"
    - "(?i)\\bCRF\\b|\\beCRF\\b|\\bEDC\\b"
    - "(?i)\\bприложен\\w*\\b|\\bappendix\\b"
  children:
    introduction:
      title_ru: Введение и предпосылки
      patterns:
        - "(?i)\\bвведен\\w*\\b"
        - "(?i)\\bпредпосылк\\w*\\b"
        - "(?i)\\bbackground\\b"
        - "(?i)\\bintroduction\\b"

    rationale:
      title_ru: Обоснование исследования / дизайна
      # Статистика: «Обоснование дизайна исследования» (80x), «Обоснование исследования» (13x),
      # «Обоснование клинического исследования» (3x), «Обоснование дозы» (3x)
      patterns:
        - "(?i)\\bобоснован\\w*\\s+исследован\\w*\\b"
        - "(?i)\\bобоснован\\w*\\s+дизайн\\w*\\b"
        - "(?i)\\bобоснован\\w*\\s+клиническ\\w*\\b"
        - "(?i)\\bобоснован\\w*\\s+выбранн\\w*\\s+доз\\w*\\b"
        - "(?i)\\bнаучн\\w*\\s+обоснован\\w*\\b"
        - "(?i)\\bобоснован\\w*\\s+доз\\w*\\s+и\\s+соотношен\\w*\\b"
        - "(?i)\\bstudy\\s+rationale\\b"
        - "(?i)\\brationale\\b"

    objectives:
      title_ru: Цели и задачи
      patterns:
        - "(?i)\\bцел[ьи]\\b"
        - "(?i)\\bзадач\\w*\\b"
        - "(?i)\\bobjectives\\b"
        - "(?i)\\baims?\\b"

    synopsis:
      title_ru: Упоминание synopsis (внутри обзора)
      # Это подзона overview; основная "истина" synopsis у вас идёт отдельной зоной synopsis ниже.
      patterns:
        - "(?i)\\bсинопсис\\b"
        - "(?i)\\bsynopsis\\b"
        - "(?i)\\bexecutive\\s+summary\\b"
        - "(?i)\\bрезюме\\b"

    definitions:
      title_ru: Определения и сокращения
      # аккуратный гейт, чтобы не ловить "определение НЯ" из safety
      require_patterns:
        - "(?i)\\b(список\\s+сокращен\\w*|abbreviations?)\\b"
        - "(?i)\\b(термин\\w*\\s+и\\s+определен\\w*|definitions?)\\b"
        - "(?i)\\bглоссар\\w*\\b"
      patterns:
        - "(?i)\\bсписок\\s+сокращен\\w*\\b"
        - "(?i)\\bсокращен\\w*\\b"
        - "(?i)\\babbreviations?\\b"
        - "(?i)\\bтермин\\w*\\s+и\\s+определен\\w*\\b"
        - "(?i)\\bdefinitions?\\b"
        - "(?i)\\bглоссар\\w*\\b"
      not_keywords:
        - "(?i)\\bнежелател\\w*\\b|\\bбезопасност\\w*\\b|\\bSAE\\b|\\bAE\\b"

# -------------------------------
# SYNOPSIS (истина)
# -------------------------------
synopsis:
  canonical_zone: synopsis
  title_ru: Synopsis (истина)
  # Жёсткий гейт: synopsis выбирается только если явно есть "синопсис/synopsis/резюме/краткое содержание"
  require_patterns:
    - "(?i)(синопсис|синоспис|synopsis|executive\\s+summary|summary|резюме|краткое\\s+содержание|краткий\\s+обзор)"
  patterns:
    - "(?i)^\\s*(синопсис|синоспис|synopsis|executive\\s+summary|summary|резюме)\\s*(протокол\\w*)?\\s*(исследовани\\w*)?\\s*$"
    - "(?i)\\bсинопсис\\b"
    - "(?i)\\bсиноспис\\b"
    - "(?i)\\bsynopsis\\b"
    - "(?i)\\bexecutive\\s+summary\\b"
    - "(?i)\\bкратк\\w*\\s+описан\\w*\\b"
    - "(?i)\\bкраткое\\s+содержание\\s+протокол\\w*\\b"
    - "(?i)\\bкраткое\\s+содержание\\b"
    - "(?i)\\bкраткий\\s+обзор\\b"
    - "(?i)\\bстраница\\s+с\\s+синопсисом\\b"
  not_keywords:
    - "(?i)\\bприложен\\w*\\b|\\bappendix\\b"
    - "(?i)\\bлитератур\\w*\\b|\\breferences?\\b"

# -------------------------------
# DESIGN
# -------------------------------
design:
  canonical_zone: design
  title_ru: Дизайн исследования
  patterns:
    - "(?i)\\bдизайн\\s+исследован\\w*\\b"
    - "(?i)\\bstudy\\s+design\\b"
    - "(?i)\\bсхем\\w*\\s+исследован\\w*\\b"
  not_keywords:
    - "(?i)\\bпрепарат\\w*\\b|\\bdrug\\b|\\bIMP\\b|\\bIP\\b"
    - "(?i)\\bдоз\\w*\\b|\\bdose\\b|\\bdosing\\b|\\badministration\\b"
    - "(?i)\\bстатист\\w*\\b|\\bSAP\\b"
  children:
    study_design:
      title_ru: Общий дизайн
      patterns:
        - "(?i)\\bдизайн\\b"
        - "(?i)\\bсхем\\w*\\b"
        - "(?i)\\bпараллельн\\w*\\b"
        - "(?i)\\bcrossover\\b|\\bкроссовер\\w*\\b"
        - "(?i)\\bмультицентров\\w*\\b|\\bmulticenter\\b"

    study_type:
      title_ru: Тип исследования
      patterns:
        - "(?i)\\bрандомизир\\w*\\b"
        - "(?i)\\bплацебо\\b"
        - "(?i)\\bконтролир\\w*\\b"
        - "(?i)\\bдвойное\\s+слеп\\w*\\b"
        - "(?i)\\bplacebo\\b|\\bcontrolled\\b"

    study_phases:
      title_ru: Фаза / этапы
      patterns:
        - "(?i)\\bфаз[аы]\\b"
        - "(?i)\\bэтап\\w*\\b"
        - "(?i)\\bphase\\b"

    blinding_and_unblinding:
      title_ru: Ослепление / заслепление / разослепление
      # Статистика: «Заслепление» (29x), «Расслепление» (30x), «Ослепление» (13x),
      # «Рандомизация и ослепление» (3x), «Слепой метод/режим» (2x)
      require_patterns:
        - "(?i)\\b(ослеплен\\w*|заслеплен\\w*|расслеплен\\w*|разослеплен\\w*|слеп\\w*|blind\\w*|unblind\\w*)\\b"
      patterns:
        - "(?i)\\bослеплен\\w*\\b"
        - "(?i)\\bзаслеплен\\w*\\b"
        - "(?i)\\bрасслеплен\\w*\\b"
        - "(?i)\\bразослеплен\\w*\\b"
        - "(?i)\\bслеп\\w*\\s+(метод|режим)\\b"
        - "(?i)\\bдвойн\\w*\\s+слеп\\w*\\b"
        - "(?i)\\bblind\\w*\\b"
        - "(?i)\\bunblind\\w*\\b"
        - "(?i)\\bрандомизационн\\w*\\s+код\\w*\\b"
        - "(?i)\\bхранен\\w*\\s+(и\\s+)?раскрыт\\w*\\s+рандомизацион\\w*\\b"
      not_keywords:
        - "(?i)\\bCRF\\b|\\beCRF\\b|\\bEDC\\b"

    randomization:
      title_ru: Рандомизация
      # best practice gate
      require_patterns:
        - "(?i)\\bрандомизац\\w*\\b"
        - "(?i)\\brandomi[sz]\\w*\\b"
        - "(?i)\\bслучайн\\w*\\s+распределен\\w*\\b"
      patterns:
        - "(?i)\\bрандомизац\\w*\\b"
        - "(?i)\\brandomi[sz]ation\\b"
        - "(?i)\\bсоотношен\\w*\\s+\\d+:\\d+\\b"
        - "(?i)\\bстратификац\\w*\\b|\\bstratification\\b"
      not_keywords:
        - "(?i)\\bстатист\\w*\\b"

    visit_schedule:
      title_ru: График визитов / окна
      # best practice gate (AND)
      require_patterns:
        - "(?i)(?=.*\\b(визит\\w*|visit)\\b)(?=.*\\b(день|day|недел\\w*|±|окн\\w*)\\b)"
      patterns:
        - "(?i)\\bвизит\\w*\\b"
        - "(?i)\\bокн\\w*\\s+визит\\w*\\b"
        - "(?i)\\bvisit\\s+window\\b"
        - "(?i)\\bдень\\s*\\d+\\b"
      not_keywords:
        - "(?i)\\bрандомизацион\\w*\\s+(таблиц\\w*|лист\\w*|список)\\b"
        - "(?i)\\bCRF\\b|\\beCRF\\b|\\bEDC\\b"

    study_duration:
      title_ru: Длительность / периоды
      patterns:
        - "(?i)\\bдлительн\\w*\\b"
        - "(?i)\\bпродолжительн\\w*\\b"
        - "(?i)\\bstudy\\s+duration\\b"
        - "(?i)\\bperiod\\b|\\bпериод\\w*\\b"

    discontinuation_criteria:
      title_ru: Критерии досрочного прекращения
      patterns:
        - "(?i)\\bпрекращен\\w*\\s+участ\\w*\\b"
        - "(?i)\\bдосрочн\\w*\\s+завершен\\w*\\b"
        - "(?i)\\bwithdraw\\w*\\b"
        - "(?i)\\bdiscontinuation\\b"

# -------------------------------
# IP
# -------------------------------
ip:
  canonical_zone: ip
  title_ru: Исследуемый препарат / лечение
  patterns:
    - "(?i)\\bисследуем\\w*\\s+препарат\\w*\\b"
    - "(?i)\\bIMP\\b|\\binvestigational\\s+product\\b"
    - "(?i)\\bлекарственн\\w*\\s+форм\\w*\\b|\\bdosage\\s+form\\b"
  not_keywords:
    - "(?i)\\bстатист\\w*\\b"
  children:
    description:
      title_ru: Описание препарата
      require_patterns:
        - "(?i)\\b(препарат\\w*|drug|IMP|investigational)\\b"
      patterns:
        - "(?i)\\bсостав\\b|\\bcomposition\\b"
        - "(?i)\\bвспомогательн\\w*\\b"
        - "(?i)\\bописан\\w*\\b(?=.*\\b(препарат\\w*|drug|IMP)\\b)"
        - "(?i)\\bлекарственн\\w*\\s+форм\\w*\\b|\\bdosage\\s+form\\b"

    dosing_and_administration:
      title_ru: Режим дозирования / введение / способ применения
      # Статистика: «Режим дозирования и способ применения» (2x), «Многократное дозирование» (6x),
      # «Когорты однократного/многократного дозирования» (3+3x), «Дозы, длительность приема» (4x)
      require_patterns:
        - "(?i)(?=.*\\b(доз\\w*|dose)\\b)(?=.*\\b(прием\\w*|введен\\w*|administration|раз\\s+в|ежедневн\\w*|q\\d+h)\\b)"
        - "(?i)\\b(титрац\\w*|titration|эскалац\\w*)\\b"
        - "(?i)\\bрежим\\w*\\s+дозирован\\w*\\b"
        - "(?i)\\bспособ\\w*\\s+применен\\w*\\b"
        - "(?i)\\b(однократн|многократн)\\w*\\s+дозирован\\w*\\b"
        - "(?i)\\bкогорт\\w*\\s+(однократн|многократн)\\w*\\s+дозирован\\w*\\b"
        - "(?i)\\b(\\d+\\s*(мг|mg))\\b"
      patterns:
        - "(?i)\\bдоз\\w*\\b|\\bdose\\b"
        - "(?i)\\bрежим\\w*\\s+дозирован\\w*\\b"
        - "(?i)\\bспособ\\w*\\s+применен\\w*\\b"
        - "(?i)\\bприем\\w*\\b|\\badministration\\b"
        - "(?i)\\bтитрац\\w*\\b|\\btitration\\b"
        - "(?i)\\bэскалац\\w*\\b"
        - "(?i)\\b(однократн|многократн)\\w*\\s+дозирован\\w*\\b"
        - "(?i)\\bпероральн\\w*\\b|\\bвнутрь\\b|\\boral\\b"
        - "(?i)\\bпосле\\s+еды\\b|\\bпосле\\s+ужина\\b|\\bwith\\s+food\\b"

    packaging_and_labeling:
      title_ru: Упаковка / маркировка
      require_patterns:
        - "(?i)\\b(упаковк\\w*|маркир\\w*|этикет\\w*|label(l)?ing|packaging)\\b"
      patterns:
        - "(?i)\\bупаковк\\w*\\b|\\bpackaging\\b"
        - "(?i)\\bмаркир\\w*\\b|\\blabel(l)?ing\\b"
        - "(?i)\\bсерийн\\w*\\s+номер\\b|\\bbatch\\b|\\blot\\b"

    storage_and_accountability:
      title_ru: Хранение / учет препарата
      # Статистика: «Хранение и учет исследуемого препарата» (44x),
      # «Хранение исследуемого препарата» (16x), «Учет исследуемого препарата» (26x)
      require_patterns:
        - "(?i)\\b(услов\\w*\\s+хранен\\w*|storage|учет\\w*\\s+препарат\\w*|accountability)\\b"
        - "(?i)\\bхранен\\w*\\s+(и\\s+)?учет\\w*\\s+(исследуем\\w*\\s+)?препарат\\w*\\b"
        - "(?i)\\bхранен\\w*\\s+(исследуем\\w*\\s+)?препарат\\w*\\b"
        - "(?i)\\bучет\\w*\\s+(исследуем\\w*\\s+)?препарат\\w*\\b"
      patterns:
        - "(?i)\\bхранен\\w*\\s+(и\\s+)?учет\\w*\\s+(исследуем\\w*\\s+)?препарат\\w*\\b"
        - "(?i)\\bхранен\\w*\\s+(исследуем\\w*\\s+)?препарат\\w*\\b"
        - "(?i)\\bучет\\w*\\s+(исследуем\\w*\\s+)?препарат\\w*\\b"
        - "(?i)\\bуслов\\w*\\s+хранен\\w*\\b|\\bstorage\\b"
        - "(?i)\\bтемператур\\w*\\b|\\bcontrolled\\s+room\\s+temperature\\b"
        - "(?i)\\baccountability\\b"
        - "(?i)\\bвозврат\\w*\\b|\\breturn\\b|\\bdestroy\\b|\\bутилизац\\w*\\b"

    concomitant_therapy:
      title_ru: Сопутствующая терапия / запрещенные препараты
      # best practice gate
      require_patterns:
        - "(?i)\\b(сопутствующ\\w*|concomitant)\\b"
        - "(?i)\\b(запрещенн\\w*|prohibit\\w*|разрешенн\\w*|permit\\w*|не\\s+разрешенн\\w*)\\b"
      patterns:
        - "(?i)\\bсопутствующ\\w*\\s+терап\\w*\\b|\\bconcomitant\\b"
        - "(?i)\\bзапрещенн\\w*\\b|\\bprohibit\\w*\\b"
        - "(?i)\\bразрешенн\\w*\\b|\\bpermit\\w*\\b"
        - "(?i)\\brescue\\b|\\bспасательн\\w*\\s+терап\\w*\\b"

    preclinical_data:
      title_ru: Доклинические данные
      require_patterns:
        - "(?i)\\b(доклинич\\w*|preclinical|in\\s+vivo|in\\s+vitro|tox\\w*|токсиколог\\w*)\\b"
      patterns:
        - "(?i)\\bдоклинич\\w*\\b|\\bpreclinical\\b"
        - "(?i)\\bтоксиколог\\w*\\b|\\btox\\w*\\b"
        - "(?i)\\bфармаколог\\w*\\b|\\bpharmacolog\\w*\\b"
        - "(?i)\\bживотн\\w*\\b|\\banimal\\b"

# -------------------------------
# POPULATION
# -------------------------------
population:
  canonical_zone: population
  title_ru: Популяция / критерии
  # Статистика: «Исследуемая популяция» (82x), «Популяции для анализа» (75x),
  # «ВЫБОР исследуемой популяции» (43x), «Описание исследуемой популяции» (14x)
  patterns:
    - "(?i)\\bкритери\\w*\\s+включен\\w*\\b"
    - "(?i)\\bкритери\\w*\\s+невключен\\w*\\b"
    - "(?i)\\bкритери\\w*\\s+исключен\\w*\\b"
    - "(?i)\\binclusion\\s+criteria\\b|\\bexclusion\\s+criteria\\b"
    # Новые паттерны из анализа 156 протоколов
    - "(?i)\\bисследуем\\w*\\s+популяц\\w*\\b"
    - "(?i)\\bпопуляц\\w*\\s+(для\\s+анализ\\w*|пациент\\w*|безопасност\\w*|исследован\\w*|по\\s+протокол\\w*)\\b"
    - "(?i)\\bвыбор\\w*\\s+(исследуем\\w*\\s+)?популяц\\w*\\b"
    - "(?i)\\bописан\\w*\\s+исследуем\\w*\\s+популяц\\w*\\b"
    - "(?i)\\bотбор\\w*\\s+(и\\s+исключен\\w*\\s+)?субъект\\w*\\b"
    - "(?i)\\bсубъект\\w*\\s+исследован\\w*\\b"
    - "(?i)\\bучастник\\w*\\s+исследован\\w*\\b"
  not_keywords:
    - "(?i)\\bстатист\\w*\\b|\\bSAP\\b"
  children:
    eligibility_criteria:
      title_ru: Критерии включения/невключения/исключения
      require_patterns:
        - "(?i)\\b(критери\\w*\\s+(включен\\w*|невключен\\w*|исключен\\w*)|inclusion\\s+criteria|exclusion\\s+criteria)\\b"
      patterns:
        - "(?i)\\bкритери\\w*\\s+включен\\w*\\b"
        - "(?i)\\bкритери\\w*\\s+невключен\\w*\\b"
        - "(?i)\\bкритери\\w*\\s+исключен\\w*\\b"
        - "(?i)\\binclusion\\s+criteria\\b"
        - "(?i)\\bexclusion\\s+criteria\\b"

    demographics_and_baseline:
      title_ru: Демография / исходные характеристики
      patterns:
        - "(?i)\\bдемограф\\w*\\b"
        - "(?i)\\bисходн\\w*\\s+характерист\\w*\\b"
        - "(?i)\\bbaseline\\s+characteristics\\b"

    sample_size:
      title_ru: Численность / план набора (в популяции)
      # Статистика: «Планируемое количество субъектов» (31x), «Набор добровольцев» (4x),
      # «Регистрация пациента/добровольца» (38+28x)
      require_patterns:
        - "(?i)\\b(планируем\\w*\\s+(количеств|числ)\\w*\\s+(пациент|субъект|добровольц|участник)\\w*)\\b"
        - "(?i)\\b(набор\\s+(пациент|субъект|добровольц|участник)\\w*)\\b"
        - "(?i)\\b(регистрац\\w*\\s+(пациент|субъект|добровольц)\\w*)\\b"
      patterns:
        - "(?i)\\bпланируем\\w*\\s+(количеств|числ)\\w*\\s+(пациент|субъект|добровольц|участник)\\w*\\b"
        - "(?i)\\bнабор\\s+(пациент|субъект|добровольц|участник)\\w*\\b"
        - "(?i)\\bрандомизир\\w*\\s+пациент\\w*\\b"
        - "(?i)\\bрегистрац\\w*\\s+(пациент|субъект|добровольц)\\w*\\b"

    withdrawal_and_replacement:
      title_ru: Выбытие / замена участников
      # Статистика: «Досрочное выбывание» (1x), «Замена участников» (6x),
      # «Последующее наблюдение за выбывшими» (4x)
      patterns:
        - "(?i)\\bдосрочн\\w*\\s+выбы\\w*\\b"
        - "(?i)\\bзамен\\w*\\s+(пациент|субъект|добровольц|участник)\\w*\\b"
        - "(?i)\\bвыбывш\\w*\\s+(из\\s+исследован\\w*|добровольц\\w*|пациент\\w*)\\b"
        - "(?i)\\bполитик\\w*\\s+замен\\w*\\b"
        - "(?i)\\bwithdraw\\w*\\b"
        - "(?i)\\breplacement\\b"

    vulnerable_groups:
      title_ru: Уязвимые группы / опекун
      patterns:
        - "(?i)\\bуязвим\\w*\\b"
        - "(?i)\\bнедееспособ\\w*\\b"
        - "(?i)\\bопекун\\w*\\b"
        - "(?i)\\bvulnerable\\b"

    contraception_requirements:
      title_ru: Контрацепция / беременность
      require_patterns:
        - "(?i)\\b(контрацепц\\w*|беременност\\w*|pregnan\\w*)\\b"
      patterns:
        - "(?i)\\bконтрацепц\\w*\\b"
        - "(?i)\\bбеременност\\w*\\b"
        - "(?i)\\bpregnan\\w*\\b"
        - "(?i)\\bтест\\s+на\\s+беременност\\w*\\b"

# -------------------------------
# PROCEDURES
# -------------------------------
procedures:
  canonical_zone: procedures
  title_ru: Процедуры
  # Статистика: «Процедуры исследования» (49x), «ОПИСАНИЕ ПРОЦЕДУР» (84x), «Study Procedures» (2x)
  patterns:
    - "(?i)\\bпроцедур\\w*\\s+исследован\\w*\\b"
    - "(?i)\\bописан\\w*\\s+процедур\\w*\\b"
    - "(?i)\\bпорядок\\s+проведен\\w*\\b"
    - "(?i)\\bметод\\w*\\s+исследован\\w*\\b"
    - "(?i)\\bstudy\\s+procedures?\\b"
  not_keywords:
    - "(?i)\\bстатист\\w*\\b"
    - "(?i)\\bконечн\\w*\\s+точк\\w*\\b"
    - "(?i)\\bадминистративн\\w*\\b"
  children:
    schedule_of_assessments:
      title_ru: График процедур / SoA / расписание визитов
      # Статистика: 156 протоколов, 194 SoA-таблицы, 97% — procedure_matrix.
      # Доминирующий термин: «График процедур» (56%), далее «График проведения процедур» (15%),
      # «Расписание процедур» (~5%), «Список процедур» (~3%), «Schedule of Assessments» (2%).
      require_patterns:
        # EN: Schedule of Assessments/Activities/Events/Evaluations, SoA, Study Schedules
        - "(?i)\\b(schedule\\s+of\\s+(assessments|activities|events|evaluations)|SoA)\\b"
        - "(?i)\\bstudy\\s+(procedures?|activities)\\s*(schedule|table|overview)\\b"
        # RU: «График процедур/мероприятий/обследований/визитов» — покрывает 59% SoA
        - "(?i)\\bграфик\\w*\\s+(процедур|мероприятий|обследован|визит|исследован)\\w*\\b"
        # RU: «График проведения процедур» — покрывает ~15% SoA (Chemrar, Biointegrator, Polisan, MolTech, NewVac)
        - "(?i)\\bграфик\\w*\\s+проведен\\w*\\s+процедур\\w*\\b"
        # RU: «Расписание процедур» — Polisan, Polysan
        - "(?i)\\bрасписани\\w*\\s+(процедур|визит|исследован)\\w*\\b"
        # RU: «Список процедур» / «Перечень процедур» — Akrus, Dimebonet, ФГБУН
        - "(?i)\\b(список|перечень)\\s+процедур\\s+исследован\\w*\\b"
        # RU: «Регламент (клинического) исследования» — VLT-015, Тетра (наши 3 протокола)
        - "(?i)\\bрегламент\\w*\\s+(клинического\\s+)?исследован\\w*\\b"
        # RU: «Блок-схема (клинического) исследования» — VLT-015
        - "(?i)\\bблок[-\\s]?схем\\w*\\s+(клинического\\s+)?исследован\\w*\\b"
        # RU: «Схема проведения процедур» — STР, Тетра (BE-протоколы)
        - "(?i)\\bсхем\\w*\\s+проведен\\w*\\s+процедур\\w*\\b"
        # RU: «План мероприятий / проведения процедур» — Roche, ФГБУ
        - "(?i)\\bплан\\w*\\s+(мероприят|проведен\\w*\\s+процедур|обследован)\\w*\\b"
        # RU: «План исследования» — Biotechnos OA-ALF-01, CDRI НЛТ, Chemrar CNS-10
        # (в контексте SOA: заголовок таблицы с визитами/процедурами/днями)
        - "(?i)\\bплан\\w*\\s+исследован\\w*\\b"
      patterns:
        # EN
        - "(?i)\\bschedule\\s+of\\s+(assessments|activities|events|evaluations)\\b"
        - "(?i)\\bSoA\\b"
        - "(?i)\\bstudy\\s+(procedures?|activities)\\s*(schedule|table)\\b"
        - "(?i)\\btime\\s+and\\s+events?\\b"
        # RU: основной термин (56% всех SoA)
        - "(?i)\\bграфик\\w*\\s+(процедур|мероприятий|обследован|визит|исследован)\\w*\\b"
        - "(?i)\\bграфик\\w*\\s+проведен\\w*\\s+процедур\\w*\\b"
        # RU: расписание
        - "(?i)\\bрасписани\\w*\\s+(процедур|визит|исследован)\\w*\\b"
        # RU: список / перечень
        - "(?i)\\b(список|перечень)\\s+процедур\\s+исследован\\w*\\b"
        # RU: регламент / блок-схема / схема процедур
        - "(?i)\\bрегламент\\w*\\s+(клинического\\s+)?исследован\\w*\\b"
        - "(?i)\\bблок[-\\s]?схем\\w*\\s+(клинического\\s+)?исследован\\w*\\b"
        - "(?i)\\bсхем\\w*\\s+проведен\\w*\\s+процедур\\w*\\b"
        # RU: план мероприятий / процедур / исследования
        - "(?i)\\bплан\\w*\\s+(мероприят|проведен\\w*\\s+процедур|обследован)\\w*\\b"
        - "(?i)\\bплан\\w*\\s+исследован\\w*\\b"
      not_keywords:
        - "(?i)\\bрандомизацион\\w*\\s+(лист\\w*|таблиц\\w*|список)\\b"
        # Исключить графики отбора ФК-образцов (FP в анализе)
        - "(?i)\\bграфик\\w*\\s+отбор\\w*\\s+образц\\w*\\b"
        - "(?i)\\bграфик\\w*\\s+сбор\\w*\\s+данн\\w*\\b"

    screening:
      title_ru: Скрининг
      require_patterns:
        - "(?i)\\b(скрининг|screening)\\b"
      patterns:
        - "(?i)\\bскрининг\\b"
        - "(?i)\\bscreening\\b"

    physical_examination:
      title_ru: Физикальное обследование
      require_patterns:
        - "(?i)\\b(физикальн\\w*\\s+обследован\\w*|physical\\s+examination|осмотр)\\b"
      patterns:
        - "(?i)\\bфизикальн\\w*\\s+обследован\\w*\\b"
        - "(?i)\\bphysical\\s+examination\\b"
        - "(?i)\\bосмотр\\w*\\b"

    vital_signs:
      title_ru: Жизненно важные показатели / антропометрия
      # Статистика: «Жизненно важные показатели» (3x), «Антропометрические и жизненно важные показатели» (5x),
      # «Показатели жизнедеятельности» (2x), «Жизненно важные параметры» (1x)
      require_patterns:
        - "(?i)\\b(жизненно\\s+важн\\w*|vital\\s+signs?|АД|ЧСС)\\b"
        - "(?i)\\bпоказател\\w*\\s+жизнедеятельност\\w*\\b"
        - "(?i)\\bантропометрич\\w*\\b"
      patterns:
        - "(?i)\\bжизненно\\s+важн\\w*\\s+(функц\\w*|показател\\w*|параметр\\w*)\\b"
        - "(?i)\\bпоказател\\w*\\s+жизнедеятельност\\w*\\b"
        - "(?i)\\bантропометрич\\w*\\s+(и\\s+жизненно\\s+важн\\w*)?\\s*показател\\w*\\b"
        - "(?i)\\bантропометрич\\w*\\b"
        - "(?i)\\bvital\\s+signs?\\b"
        - "(?i)\\bАД\\b"
        - "(?i)\\bЧСС\\b"
        - "(?i)\\bЧДД\\b"

    laboratory_assessments:
      title_ru: Лабораторные исследования
      require_patterns:
        - "(?i)\\b(лабораторн\\w*|laborator\\w*|анализ\\s+крови|анализ\\s+мочи)\\b"
      patterns:
        - "(?i)\\bлабораторн\\w*\\b"
        - "(?i)\\blaborator\\w*\\b"
        - "(?i)\\bанализ\\s+крови\\b"
        - "(?i)\\bанализ\\s+мочи\\b"
        - "(?i)\\bбиохим\\w*\\b"
        - "(?i)\\bгематолог\\w*\\b"

    imaging:
      title_ru: Инструментальные исследования / визуализация / ЭКГ
      # Статистика: «ЭКГ» (103x), «Электрокардиография» (66x), «Электрокардиограмма» (1x)
      require_patterns:
        - "(?i)\\b(МРТ|КТ|УЗИ|рентген\\w*|MRI|CT\\b|ultrasound|X-?ray|ЭКГ|ECG)\\b"
        - "(?i)\\bэлектрокардиогра\\w*\\b"
        - "(?i)\\belectrocardiogr\\w*\\b"
        - "(?i)\\bфлюорограф\\w*\\b"
      patterns:
        - "(?i)\\bМРТ\\b|\\bMRI\\b"
        - "(?i)\\bКТ\\b|\\bCT\\b"
        - "(?i)\\bУЗИ\\b|\\bultrasound\\b"
        - "(?i)\\bрентген\\w*\\b|\\bX-?ray\\b"
        - "(?i)\\bфлюорограф\\w*\\b"
        - "(?i)\\bЭКГ\\b|\\bECG\\b"
        - "(?i)\\bэлектрокардиогра\\w*\\b"
        - "(?i)\\belectrocardiogr\\w*\\b"

    sample_handling:
      title_ru: Биоматериал / забор / обработка образцов
      require_patterns:
        - "(?i)\\b(забор\\s+крови|отбор\\s+крови|био(материал|образц)\\w*|sample\\s+(handling|collection)|specimen)\\b"
      patterns:
        - "(?i)\\bзабор\\s+крови\\b"
        - "(?i)\\bотбор\\s+крови\\b"
        - "(?i)\\bбиоматериал\\w*\\b"
        - "(?i)\\bбиообразц\\w*\\b"
        - "(?i)\\bsample\\s+(handling|collection)\\b"
        - "(?i)\\bspecimen\\b"
        - "(?i)\\bцентрифуг\\w*\\b"
        - "(?i)\\bтранспортировк\\w*\\s+образц\\w*\\b"

    patient_reported_outcomes:
      title_ru: Опросники / дневники / PRO
      require_patterns:
        - "(?i)\\b(опросник\\w*|анкета\\w*|дневник\\w*|patient[-\\s]?reported|PRO)\\b"
      patterns:
        - "(?i)\\bопросник\\w*\\b"
        - "(?i)\\bанкета\\b"
        - "(?i)\\bдневник\\w*\\b"
        - "(?i)\\bpatient[-\\s]?reported\\b"
        - "(?i)\\b\\bPRO\\b\\b"

    compliance:
      title_ru: Комплаенс / комплаентность / учет таблеток
      # Статистика: «Комплаентность проводимой терапии» (58x) — доминирующий термин!
      require_patterns:
        - "(?i)\\b(комплаенс\\w*|комплаентност\\w*|compliance|уч[её]т\\s+таблет\\w*|pill\\s+count)\\b"
        - "(?i)\\bприверженност\\w*\\s+терап\\w*\\b"
      patterns:
        - "(?i)\\bкомплаенс\\w*\\b"
        - "(?i)\\bкомплаентност\\w*\\b"
        - "(?i)\\bприверженност\\w*\\s+терап\\w*\\b"
        - "(?i)\\bcompliance\\b"
        - "(?i)\\bуч[её]т\\s+таблет\\w*\\b"
        - "(?i)\\bpill\\s+count\\b"
        - "(?i)\\bвозврат\\s+препарат\\w*\\b"

# -------------------------------
# ENDPOINTS
# -------------------------------
endpoints:
  canonical_zone: endpoints
  title_ru: Конечные точки
  patterns:
    - "(?i)\\bконечн\\w*\\s+точк\\w*\\b"
    - "(?i)\\bendpoints?\\b"
    - "(?i)\\bпервичн\\w*\\s+конечн\\w*\\s+точк\\w*\\b"
    - "(?i)\\bвторичн\\w*\\s+конечн\\w*\\s+точк\\w*\\b"
  not_keywords:
    - "(?i)\\bстатист\\w*\\b|\\bSAP\\b"
  children:
    primary:
      title_ru: Первичная конечная точка
      # best practice gate (AND)
      require_patterns:
        - "(?i)(?=.*\\b(первичн\\w*|primary)\\b)(?=.*\\b(конечн\\w*\\s+точк\\w*|endpoint)\\b)"
      patterns:
        - "(?i)\\bпервичн\\w*\\s+конечн\\w*\\s+точк\\w*\\b"
        - "(?i)\\bprimary\\s+endpoint\\b"

    secondary:
      title_ru: Вторичные конечные точки
      # best practice gate (AND)
      require_patterns:
        - "(?i)(?=.*\\b(вторичн\\w*|secondary)\\b)(?=.*\\b(конечн\\w*\\s+точк\\w*|endpoint)\\b)"
      patterns:
        - "(?i)\\bвторичн\\w*\\s+конечн\\w*\\s+точк\\w*\\b"
        - "(?i)\\bsecondary\\s+endpoints?\\b"

    exploratory:
      title_ru: Исследовательские (exploratory)
      # ВНИМАНИЕ: паттерн \bисследоват\w*\b давал 71 FP на «Обязанности Исследователя»!
      # Ужесточён до конкретных конструкций.
      require_patterns:
        - "(?i)\\b(исследовательск\\w*\\s+(конечн\\w*\\s+точк\\w*|endpoint)|explorator\\w*\\s+endpoint)\\b"
        - "(?i)\\b(дополнительн\\w*|поисков\\w*|explorator\\w*)\\s+(конечн\\w*\\s+точк\\w*|endpoint|параметр\\w*)\\b"
      patterns:
        - "(?i)\\bисследовательск\\w*\\s+(конечн\\w*\\s+точк\\w*|endpoint)\\b"
        - "(?i)\\bдополнительн\\w*\\s+(конечн\\w*\\s+точк\\w*|endpoint)\\b"
        - "(?i)\\bпоисков\\w*\\s+(конечн\\w*\\s+точк\\w*|endpoint|параметр\\w*)\\b"
        - "(?i)\\bexplorator\\w*\\s+endpoints?\\b"
        - "(?i)\\bexplorator\\w*\\b"
      not_keywords:
        - "(?i)\\bобязанност\\w*\\s+исследоват\\w*\\b"
        - "(?i)\\bзаявлен\\w*\\s+исследоват\\w*\\b"
        - "(?i)\\bконтрактн\\w*\\s+исследовательск\\w*\\b"
        - "(?i)\\bисследовательск\\w*\\s+центр\\w*\\b"
        - "(?i)\\bисследовательск\\w*\\s+организац\\w*\\b"

    efficacy:
      title_ru: Эффективность (метрики/шкалы)
      # best practice: чтобы "эффективность" из rationale/background не утащила
      require_patterns:
        - "(?i)\\b(конечн\\w*\\s+точк\\w*|endpoint)\\b"
        - "(?i)\\b(шкал\\w*|опросник\\w*|score|балл\\w*|изменен\\w*)\\b"
      patterns:
        - "(?i)\\bэффективност\\w*\\b"
        - "(?i)\\befficacy\\b"
        - "(?i)\\bшкал\\w*\\b"
        - "(?i)\\bопросник\\w*\\b"
        - "(?i)\\bизменен\\w*\\b"

    pharmacokinetics:
      title_ru: Фармакокинетика (PK endpoints)
      # best practice gate
      require_patterns:
        - "(?i)\\b(фармакокинет\\w*|PK)\\b"
        - "(?i)\\b(AUC|Cmax|Cmin|Ctrough|Tmax|t1/2|CL|Vd|AUC0-?\\d+)\\b"
      patterns:
        - "(?i)\\bфармакокинет\\w*\\b"
        - "(?i)\\b\\bPK\\b\\b"
        - "(?i)\\bAUC\\b"
        - "(?i)\\bCmax\\b|\\bCmin\\b"
        - "(?i)\\bTmax\\b"
        - "(?i)\\bt1/2\\b|\\bhalf[-\\s]?life\\b"
        - "(?i)\\bclearance\\b|\\bCL\\b"
        - "(?i)\\bvolume\\s+of\\s+distribution\\b|\\bVd\\b"

# -------------------------------
# SAFETY
# -------------------------------
safety:
  canonical_zone: safety
  title_ru: Безопасность
  patterns:
    - "(?i)\\bбезопасност\\w*\\b"
    - "(?i)\\bнежелател\\w*\\s+явлен\\w*\\b"
    - "(?i)\\bНЯ\\b|\\bAE\\b"
    - "(?i)\\bСНЯ\\b|\\bSAE\\b"
  not_keywords:
    - "(?i)\\bстатист\\w*\\b|\\bSAP\\b"
  children:
    adverse_events:
      title_ru: НЯ/СНЯ (общий раздел)
      require_patterns:
        - "(?i)\\b(НЯ|AE|нежелател\\w*\\s+явлен\\w*)\\b"
        - "(?i)\\b(СНЯ|SAE|serious)\\b"
      patterns:
        - "(?i)\\b(НЯ|AE)\\b"
        - "(?i)\\b(СНЯ|SAE)\\b"
        - "(?i)\\bнежелател\\w*\\s+явлен\\w*\\b"
        - "(?i)\\bserious\\s+adverse\\s+event\\b"

    adverse_events.definitions:
      title_ru: Определения НЯ/СНЯ/TEAE
      require_patterns:
        - "(?i)(?=.*\\b(определен\\w*|definition)\\b)(?=.*\\b(НЯ|AE|СНЯ|SAE|TEAE|нежелател\\w*|adverse)\\b)"
        - "(?i)\\bTEAE\\b"
      patterns:
        - "(?i)\\bопределен\\w*\\s+(НЯ|СНЯ|нежелател\\w*)\\b"
        - "(?i)\\bопределен\\w*\\s+НР\\b"
        - "(?i)\\bdefinition\\w*\\s+(of\\s+)?(AE|SAE|adverse)\\b"
        - "(?i)\\bTEAE\\b"
      not_keywords:
        # FP: «Определение размера выборки» (27x) → это statistics, не safety
        - "(?i)\\bопределен\\w*\\s+(размер\\w*|объ[её]м\\w*)\\s+выборк\\w*\\b"
        - "(?i)\\bопределен\\w*\\s+специфич\\w*\\b"

    adverse_events.assessment:
      title_ru: Оценка НЯ (тяжесть/каузальность)
      require_patterns:
        - "(?i)\\b(тяжест\\w*|severity|степен\\w*\\s+выражен\\w*|causality|причинно[-\\s]?следствен\\w*)\\b"
      patterns:
        - "(?i)\\bтяжест\\w*\\b"
        - "(?i)\\bseverity\\b"
        - "(?i)\\bстепен\\w*\\s+выражен\\w*\\b"
        - "(?i)\\bcausality\\b"
        - "(?i)\\bпричинно[-\\s]?следствен\\w*\\s+связ\\w*\\b"

    adverse_events.reporting:
      title_ru: Репортинг / отчётность о НЯ/СНЯ
      # Статистика: «Отчетность о НЯ» (55x), «Отчетность о НЯ и СНЯ» (8x),
      # «Сроки регистрации НЯ» (34x), «Предоставление сообщений о СНЯ» (44x)
      require_patterns:
        - "(?i)(?=.*\\b(СНЯ|SAE|serious|НЯ|AE)\\b)(?=.*\\b(сообщ\\w*|уведом\\w*|report\\w*|expedited|отчетност\\w*|отчётност\\w*|регистрац\\w*)\\b)"
        - "(?i)\\b(24\\s*час\\w*|within\\s+24\\s+hours?|в\\s+течени[еи]\\s+\\d+\\s*(час\\w*|дн(я|ей)))\\b"
        - "(?i)\\bотчетност\\w*\\s+о\\s+(НЯ|СНЯ|нежелател\\w*)\\b"
        - "(?i)\\bотчётност\\w*\\s+о\\s+(НЯ|СНЯ|нежелател\\w*)\\b"
        - "(?i)\\bпредоставлен\\w*\\s+сообщен\\w*\\s+о\\s+СНЯ\\b"
        - "(?i)\\bсроки\\s+регистрац\\w*\\s+НЯ\\b"
      patterns:
        - "(?i)\\bотчетност\\w*\\s+о\\s+(НЯ|СНЯ|нежелател\\w*)\\b"
        - "(?i)\\bотчётност\\w*\\s+о\\s+(НЯ|СНЯ|нежелател\\w*)\\b"
        - "(?i)\\bпредоставлен\\w*\\s+сообщен\\w*\\s+о\\s+СНЯ\\b"
        - "(?i)\\bсроки\\s+регистрац\\w*\\s+НЯ\\b"
        - "(?i)\\bсообщен\\w*\\b|\\breport\\w*\\b"
        - "(?i)\\bуведом\\w*\\b|\\bnotify\\b"
        - "(?i)\\bexpedited\\s+report\\b"
        - "(?i)\\b24\\s*час\\w*\\b"
        - "(?i)\\bsafety\\s+reporting\\b"

    risk_benefit_assessment:
      title_ru: Польза/риск
      # Статистика: «Соотношение риск/польза» (71x) — ранее не ловилось
      require_patterns:
        - "(?i)\\b(польза\\s*/\\s*риск|risk\\s*[-/]\\s*benefit)\\b"
        - "(?i)\\bсоотношени\\w*\\s+риск\\w*/?\\s*поль\\w*\\b"
      patterns:
        - "(?i)\\bпольза\\s*/\\s*риск\\b"
        - "(?i)\\brisk\\s*[-/]\\s*benefit\\b"
        - "(?i)\\bсоотношени\\w*\\s+риск\\w*/?\\s*поль\\w*\\b"

    pharmacovigilance:
      title_ru: Фармаконадзор
      require_patterns:
        - "(?i)\\b(фармаконадзор|pharmacovigilance|PV)\\b"
      patterns:
        - "(?i)\\bфармаконадзор\\b"
        - "(?i)\\bpharmacovigilance\\b"
        - "(?i)\\b\\bPV\\b\\b"

