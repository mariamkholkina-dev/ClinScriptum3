        - "(?i)\\bсрок\\s+годност\\w*\\b|\\bshelf\\s+life\\b"
        - "(?i)\\bвыдач\\w*\\s+(исследуем\\w*\\s+)?препарат\\w*\\b"
        - "(?i)\\bнеиспольз\\w*\\s+препарат\\w*\\b"
        - "(?i)\\bособ\\w+\\s+мер\\w*\\s+предосторожн\\w*\\s+при\\s+хранен\\w*\\b"
        - "(?i)\\bпроцедур\\w*\\s+учет\\w*\\s+(исследуем\\w*\\s+)?препарат\\w*\\b"

    concomitant_therapy:
      title_ru: Сопутствующая терапия / запрещенные препараты
      # best practice gate
      require_patterns:
        - "(?i)\\b(сопутствующ\\w*|concomitant)\\b"
        - "(?i)\\b(запрещенн\\w*|prohibit\\w*|разрешенн\\w*|permit\\w*|не\\s+разрешенн\\w*)\\b"
      patterns:
        - "(?i)\\bсопутствующ\\w*\\s+терап\\w*\\b|\\bconcomitant\\b"
        - "(?i)\\bзапрещенн\\w*\\b|\\bprohibit\\w*\\b"
        - "(?i)\\bразрешенн\\w*\\b|\\bpermit\\w*\\b"
        - "(?i)\\brescue\\b|\\bспасательн\\w*\\s+терап\\w*\\b"

    preclinical_clinical_data:
      title_ru: Результаты значимых доклинических и клинических исследований
      # Гейт расширен: покрывает и доклинику (animal/in vivo/tox), и клинические данные
      # (предыдущие исследования препарата у человека). Раньше ключ был preclinical_data —
      # классификатор путал клинические results с efficacy_assessments. См.
      # project_known_bugs.md от 2026-05-01.
      require_patterns:
        - "(?i)\\b(доклинич\\w*|preclinical|in\\s+vivo|in\\s+vitro|tox\\w*|токсиколог\\w*)\\b"
        - "(?i)\\b(клиническ\\w*\\s+(данн\\w*|исследован\\w*|опыт\\w*)|clinical\\s+(data|experience|trials?))\\b"
        - "(?i)\\bрезультат\\w*\\s+(значим\\w*\\s+)?(доклинич\\w*|клиническ\\w*)\\b"
      patterns:
        - "(?i)\\bдоклинич\\w*\\b|\\bpreclinical\\b"
        - "(?i)\\bтоксиколог\\w*\\b|\\btox\\w*\\b"
        - "(?i)\\bфармаколог\\w*\\b|\\bpharmacolog\\w*\\b"
        - "(?i)\\bживотн\\w*\\b|\\banimal\\b"
        - "(?i)\\bклиническ\\w*\\s+(данн\\w*|исследован\\w*|опыт\\w*)\\b"
        - "(?i)\\bclinical\\s+(data|experience|trials?)\\b"
        - "(?i)\\bрезультат\\w*\\s+(значим\\w*\\s+)?(доклинич\\w*|клиническ\\w*)\\b"

    comparator:
      title_ru: Препарат сравнения
      # Жёсткий гейт чтобы не пересекаться с treatments (study drug),
      # population.exclusion (prior comparator use) и safety (comparator AE).
      require_patterns:
        - "(?i)\\b(препарат\\w*|средств\\w*|продукт\\w*)\\s+сравнен\\w*\\b"
        - "(?i)\\bcomparator\\b"
        - "(?i)\\bactive\\s+control\\b"
      patterns:
        - "(?i)\\b(препарат\\w*|средств\\w*|продукт\\w*)\\s+сравнен\\w*\\b"
        - "(?i)\\bcomparator\\b"
        - "(?i)\\bactive\\s+control\\b"
        - "(?i)\\breference\\s+product\\b|\\bпрепарат\\w*\\s+референс\\w*\\b"
        - "(?i)\\bplacebo\\s+comparator\\b"
      not_keywords:
        - "(?i)\\bнежелательн\\w*\\s+явлен\\w*\\b|\\badverse\\s+events?\\b"
        - "(?i)\\b(prior|предшествующ\\w*|ранее)\\s+(comparator|препарат\\w*\\s+сравнен\\w*)\\b"

    contraindications:
      title_ru: Противопоказания / меры предосторожности / передозировка / влияние на управление / беременность
      # Phase 2 (Sprint 6): эксперт включает в эту subzone все safety-related пункты
      # карточки препарата (не только противопоказания):
      # «Особые указания и меры предосторожности при применении» (FNT 83, STP 84, Тетра 84),
      # «Передозировка» (FNT 86, STP 87, Тетра 87, VLT — спорно),
      # «Влияние на способность управлять транспортными средствами» (4/4 sample),
      # «Применение при беременности и в период грудного вскармливания» (VLT 90),
      # «Примечание при беременности и грудном вскармливании» (FNT 84),
      # «Фертильность, беременность и лактация» (STP 85, Тетра 85, VLT — отдельно),
      # «С осторожностью» (VLT 89), «Особые указания» (VLT 94).
      # «Побочное действие» — спорно (FNT/STP→ip.contraindications, VLT→ip.description).
      require_patterns:
        - "(?i)\\b(противопоказан\\w*|contraindication\\w*)\\b"
        - "(?i)\\bпередозировк\\w*\\b|\\boverdose\\b"
        - "(?i)\\bособ\\w+\\s+указан\\w*\\b"
        - "(?i)\\bмер\\w*\\s+предосторожн\\w*\\b"
        - "(?i)\\bвлиян\\w*\\s+на\\s+способн\\w*\\s+(к\\s+)?управлен\\w*\\s+(транспорт\\w*|механизм\\w*)\\b"
        - "(?i)\\bвлиян\\w*\\s+на\\s+способн\\w*\\s+управлят\\w*\\s+транспорт\\w*\\b"
        - "(?i)\\b(применен\\w*|примечан\\w*|фертильн\\w*).{0,20}(беременн\\w*|лактаци\\w*|вскармлива\\w*)\\b"
        - "(?i)^\\s*с\\s+осторожностью\\s*$"
      patterns:
        - "(?i)\\bпротивопоказан\\w*\\b"
        - "(?i)\\bcontraindication\\w*\\b"
        - "(?i)\\bкогда\\s+нельзя\\b|\\bwhen\\s+not\\s+to\\s+use\\b"
        - "(?i)\\bпередозировк\\w*\\b|\\boverdose\\b"
        - "(?i)\\bособ\\w+\\s+указан\\w*\\b"
        - "(?i)\\bмер\\w*\\s+предосторожн\\w*\\b"
        - "(?i)\\bвлиян\\w*\\s+на\\s+способн\\w*\\s+(к\\s+)?управлен\\w*\\s+(транспорт\\w*|механизм\\w*)\\b"
        - "(?i)\\bвлиян\\w*\\s+на\\s+способн\\w*\\s+управлят\\w*\\s+транспорт\\w*\\b"
        - "(?i)\\b(применен\\w*|примечан\\w*|фертильн\\w*).{0,20}(беременн\\w*|лактаци\\w*|вскармлива\\w*)\\b"
        - "(?i)^\\s*с\\s+осторожностью\\s*$"
      not_keywords:
        # FP: «Регистрация беременности» — это safety.adverse_events.reporting
        - "(?i)\\bрегистрац\\w*\\s+беременност\\w*\\b"
        # FP: «Методы контрацепции» — это procedures.contraception_requirements
        - "(?i)\\bметод\\w*\\s+контрацепц\\w*\\b"

