        - "(?i)\\b(польза\\s*/\\s*риск|risk\\s*[-/]\\s*benefit)\\b"
        - "(?i)\\bсоотношени\\w*\\s+риск\\w*/?\\s*поль\\w*\\b"
        - "(?i)\\bриск\\w*,?\\s+связанн\\w*\\s+с\\b"
        - "(?i)\\bкраткое\\s+описан\\w*\\s+(известн\\w*\\s+)?(и\\s+)?потенциальн\\w*\\s+риск\\w*\\b"
        - "(?i)\\bнеизвестн\\w*\\s+или\\s+непредвиден\\w*\\s+риск\\w*\\b"
        - "(?i)\\b(потенциальн\\w*|известн\\w*)\\s+риск\\w*\\s+и\\s+польз\\w*\\b"
      patterns:
        - "(?i)\\bпольза\\s*/\\s*риск\\b"
        - "(?i)\\brisk\\s*[-/]\\s*benefit\\b"
        - "(?i)\\bсоотношени\\w*\\s+риск\\w*/?\\s*поль\\w*\\b"
        - "(?i)\\bриск\\w*,?\\s+связанн\\w*\\s+с\\b"
        - "(?i)\\bкраткое\\s+описан\\w*\\s+(известн\\w*\\s+)?(и\\s+)?потенциальн\\w*\\s+риск\\w*\\b"
        - "(?i)\\bнеизвестн\\w*\\s+или\\s+непредвиден\\w*\\s+риск\\w*\\b"
        - "(?i)\\b(потенциальн\\w*|известн\\w*)\\s+риск\\w*\\s+и\\s+польз\\w*\\b"
      not_keywords:
        # FP: «Статистический риск», «Risk ratio» — это statistics
        - "(?i)\\b(статистическ\\w*\\s+риск|risk\\s+ratio|relative\\s+risk|odds\\s+ratio)\\b"

    pharmacovigilance:
