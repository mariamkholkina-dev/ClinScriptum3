statistics:
  canonical_zone: statistics
  title_ru: Статистика / SAP
  # Статистика: покрытие было 42.3%. «Планируемые статистические методы» (55x),
  # «СТАТИСТИКА» (3x), «Анализ эффективности» (74x), «Соотношение риск/польза» (71x)
  patterns:
    - "(?i)\\bстатистич\\w*\\s+анализ\\w*\\b"
    - "(?i)\\bстатистик\\w*\\b"
    - "(?i)\\bпланируем\\w*\\s+статистическ\\w*\\b"
    - "(?i)\\bстатистическ\\w*\\s+метод\\w*\\b"
    - "(?i)\\bstatistical\\s+analysis\\b"
    - "(?i)\\bstatistical\\s+methods?\\b"
    - "(?i)\\bSAP\\b|\\bstatistical\\s+analysis\\s+plan\\b"
    - "(?i)\\bанализ\\s+эффективност\\w*\\b"
    - "(?i)\\bанализ\\s+безопасност\\w*\\b"
  not_keywords:
    - "(?i)\\bприложен\\w*\\b|\\bappendix\\b"
  children:
    analysis_plan:
      title_ru: План анализа / статистические методы
      # Статистика: «План статистического анализа» (2x), «Статистические методы» (55x), «СТАТИСТИКА» (3x)
      require_patterns:
        - "(?i)\\b(план\\s+(статистическ\\w*\\s+)?анализ\\w*|analysis\\s+plan|SAP)\\b"
        - "(?i)\\bстатистическ\\w*\\s+(метод\\w*|аспект\\w*)\\b"
        - "(?i)\\bплан\\w*\\s+статистическ\\w*\\b"
      patterns:
        - "(?i)\\bплан\\s+анализ\\w*\\b"
        - "(?i)\\bплан\\w*\\s+статистическ\\w*\\s+анализ\\w*\\b"
        - "(?i)\\bстатистическ\\w*\\s+метод\\w*\\b"
        - "(?i)\\bстатистическ\\w*\\s+аспект\\w*\\b"
        - "(?i)\\banalysis\\s+plan\\b"
        - "(?i)\\bSAP\\b"
        - "(?i)\\bstatistical\\s+methods?\\b"

    analysis_methods:
      title_ru: Методы анализа / статистический анализ X
      # best practice: требуем контекст "статистический анализ" / "statistical analysis"
      # Phase 2: расширены patterns для bare "Статистический анализ X" titles из baseline:
      # «Описание статистических методов...» (4/4 sample),
      # «Общие положения» (под statistics — FNT 139, VLT — но также под data_management у других),
      # «Статистический анализ демографических и иных исходных данных» (4/4),
      # «Статистический анализ концентраций активного вещества и параметров фармакокинетики» (3/4),
      # «Статистический анализ параметров безопасности» (3/4),
      # «Статистическая проверка критериев биоэквивалентности» (STP),
      # «Анализ первичного / вторичных параметров эффективности» (FNT),
      # «Критерии прекращения исследования» — внутри statistics (FNT, STP, VLT — спорно).
      require_patterns:
        - "(?i)\\b(статистич\\w*\\s+анализ\\w*|statistical\\s+analysis)\\b"
        - "(?i)\\b(метод\\w*\\s+статистич\\w*|statistical\\s+method\\w*)\\b"
        - "(?i)\\bописан\\w*\\s+статистич\\w*\\s+метод\\w*\\b"
        - "(?i)\\bстатистическ\\w*\\s+(анализ\\w*|проверк\\w*)\\b"
        - "(?i)\\bанализ\\s+(первичн\\w*|вторичн\\w*)\\s+(критер\\w*\\s+|параметр\\w*\\s+)?эффективност\\w*\\b"
      patterns:
        - "(?i)\\bметод\\w*\\s+анализ\\w*\\b"
        - "(?i)\\bмодель\\w*\\b"
        - "(?i)\\bANCOVA\\b"
        - "(?i)\\bMMRM\\b"
        - "(?i)\\bлогистическ\\w*\\s+регресс\\w*\\b|\\blogistic\\s+regress\\w*\\b"
        - "(?i)\\bописан\\w*\\s+статистич\\w*\\s+метод\\w*\\b"
        - "(?i)\\bстатистическ\\w*\\s+анализ\\w*\\s+\\w+"
        - "(?i)\\bстатистическ\\w*\\s+проверк\\w*\\s+критер\\w*\\b"
        - "(?i)\\bанализ\\s+(первичн\\w*|вторичн\\w*)\\s+(критер\\w*\\s+|параметр\\w*\\s+)?эффективност\\w*\\b"

    analysis_populations:
      title_ru: Популяции анализа (ITT/PP/Safety)
      # best practice gate
      require_patterns:
        - "(?i)\\b(analysis\\s+set\\w*|популяц\\w*\\s+анализ\\w*)\\b"
        - "(?i)\\b(ITT|PP|FAS|mITT|SAFETY)\\b"
      patterns:
        - "(?i)\\bITT\\b|\\bmITT\\b"
        - "(?i)\\bPP\\b"
        - "(?i)\\bFAS\\b"
        - "(?i)\\bSafety\\b|\\bSAFETY\\b"
        - "(?i)\\bпопуляц\\w*\\s+анализ\\w*\\b"
        - "(?i)\\banalysis\\s+set\\w*\\b"

    sample_size_justification:
      title_ru: Обоснование размера выборки / мощность / alpha
      # Статистика: «Определение размера выборки» (27x), «Применяемый уровень значимости» (14x),
