name: clinscriptum-dev

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-clinscriptum}
      POSTGRES_USER: ${POSTGRES_USER:-clinscriptum}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-clinscriptum}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1g

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # noeviction (НЕ allkeys-lru): BullMQ требует, чтобы Redis не вытеснял
    # ключи — иначе при достижении maxmemory произвольные ключи (jobs, locks,
    # метаданные очередей) молча удаляются и задачи pipeline теряются/виснут.
    # При noeviction переполнение даёт явную ошибку записи — это и нужно.
    command: redis-server --appendonly yes --maxmemory 200mb --maxmemory-policy noeviction
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256m

  minio:
    image: minio/minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
    volumes:
      - miniodata:/data
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512m

  migrate:
    build:
      context: .
      dockerfile: Dockerfile.api
    env_file: .env
    command: ["npx", "prisma", "migrate", "deploy", "--schema=packages/db/prisma/schema.prisma"]
    depends_on:
      postgres:
        condition: service_healthy
    profiles: ["migrate"]
    restart: "no"

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: unless-stopped
    env_file: .env
    environment:
      # Node не знает про cgroup memory limit (1g ниже) и ставит heap выше —
      # упирается и падает по OOM. Держим heap ниже лимита контейнера, оставляя
      # ~128 МБ на не-heap (C++/буферы). См. fix/document-listall-heap.
      NODE_OPTIONS: "--max-old-space-size=896"
    ports:
      - "127.0.0.1:4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 1g

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        NEXT_PUBLIC_API_URL: https://api.dev.clinscriptum.ru/trpc
    restart: unless-stopped
    env_file: .env
    environment:
      # Override .env PORT (which is 4000 for api) and bind on all interfaces
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - api
    deploy:
      resources:
        limits:
          memory: 512m

  rule-admin:
    build:
      context: .
      dockerfile: Dockerfile.rule-admin
      args:
        NEXT_PUBLIC_API_URL: https://api.dev.clinscriptum.ru/trpc
    restart: unless-stopped
    env_file: .env
    environment:
      PORT: "3002"
      HOSTNAME: "0.0.0.0"
    ports:
      - "127.0.0.1:3002:3002"
    depends_on:
      - api
    deploy:
      resources:
        limits:
          memory: 512m

  workers:
    build:
      context: .
      dockerfile: Dockerfile.workers
    restart: unless-stopped
    env_file: .env
    environment:
      # См. сервис api: heap ниже cgroup-лимита (1g) во избежание OOM.
      NODE_OPTIONS: "--max-old-space-size=896"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 1g

  # Word add-in static dist (vite build → nginx serve). Office.js загружает
  # add-in по URL из manifest.xml. В prod нужен HTTPS — TLS termination
  # делается reverse-proxy выше (Traefik / nginx-proxy / cloudflare).
  word-addin:
    build:
      context: .
      dockerfile: apps/word-addin/Dockerfile
      args:
        # Публичный URL по которому Office грузит add-in. Меняй для prod
        # (например https://word-addin.dev.clinscriptum.ru) — при build
        # подставится в manifest.xml через sed.
        WORD_ADDIN_PUBLIC_URL: https://word-addin.dev.clinscriptum.ru
        # API URL зашивается в JS bundle на этапе vite build. Без него add-in
        # пытается стучаться на localhost:4000 у пользователя в Word, где
        # никакого API нет.
        VITE_API_URL: https://api.dev.clinscriptum.ru
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:80"
    deploy:
      resources:
        limits:
          memory: 256m

volumes:
  pgdata:
  redisdata:
  miniodata:
