# Nginx config для раздачи Word add-in static (vite-built SPA).
#
# Office.js / Word загружают add-in в iframe внутри task pane. Поэтому:
#   - HTTPS обязателен в prod (TLS termination делается reverse-proxy выше — Traefik/nginx-proxy/cloudflare)
#   - X-Frame-Options должен разрешать загрузку из Office домена
#   - CORS нужен если API на другом origin'е (рекомендуется same-origin через proxy)

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Manifest нужно раздавать как application/xml — Office проверяет content-type.
    location = /manifest.xml {
        add_header Content-Type "application/xml; charset=utf-8";
        try_files $uri =404;
    }

    # Static assets с long-cache (vite добавляет content-hash в имена файлов).
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA-fallback: всё неопознанное → index.html (single-page app routing).
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Office.js загружается с https://appsforoffice.microsoft.com — нужно разрешить
    # в фрейме. По умолчанию nginx не ставит X-Frame-Options, но если выше есть
    # reverse-proxy с DENY — нужно явно переопределить.
    add_header X-Frame-Options "" always;

    # Health check
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }
}
